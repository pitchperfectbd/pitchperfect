<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>PitchPerfect BD – World Cup 2026 Jerseys</ti
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow:wght@400;600;700;800&display=swap" rel="stylesheet"/>

  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --dark: #05070d;
      --card: #101827;
      --green: #00e676;
      --blue: #00c2ff;
      --pink: #ff2f8f;
      --gold: #ffd700;
      --red: #ff3d3d;
      --text: #ffffff;
      --muted: #9db2c7;
      --insta: #e1306c;
      --messenger: #0084ff;
    }

    html { scroll-behavior: smooth; }

    body {
      background:
        radial-gradient(circle at top left, rgba(0,230,118,0.18), transparent 32%),
        radial-gradient(circle at top right, rgba(255,47,143,0.18), transparent 30%),
        radial-gradient(circle at bottom, rgba(0,194,255,0.12), transparent 35%),
        var(--dark);
      color: var(--text);
      font-family: 'Barlow', sans-serif;
      overflow-x: hidden;
    }

    nav {
      position: sticky;
      top: 0;
      z-index: 50;
      background: rgba(5,7,13,0.82);
      backdrop-filter: blur(14px);
      border-bottom: 1px solid rgba(255,255,255,0.08);
      padding: 14px 24px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .logo {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 30px;
      letter-spacing: 2px;
    }

    .logo span { color: var(--green); }

    .nav-links {
      display: flex;
      gap: 18px;
      flex-wrap: wrap;
    }

    .nav-links a {
      color: var(--muted);
      text-decoration: none;
      font-size: 13px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .nav-links a:hover { color: var(--green); }

    header {
      min-height: 86vh;
      display: grid;
      grid-template-columns: 1.1fr 0.9fr;
      align-items: center;
      gap: 30px;
      padding: 70px 7%;
    }

    .badge {
      display: inline-block;
      background: linear-gradient(90deg, var(--green), var(--blue));
      color: #000;
      font-family: 'Bebas Neue', sans-serif;
      font-size: 15px;
      letter-spacing: 3px;
      padding: 7px 16px;
      border-radius: 999px;
      margin-bottom: 18px;
    }

    h1 {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(64px, 12vw, 135px);
      line-height: 0.82;
      letter-spacing: 4px;
      text-shadow: 0 0 60px rgba(0,230,118,0.25);
    }

    h1 span {
      background: linear-gradient(90deg, var(--green), var(--blue), var(--pink));
      -webkit-background-clip: text;
      color: transparent;
    }

    .hero-text p {
      max-width: 580px;
      color: var(--muted);
      font-size: 18px;
      margin: 22px 0;
      line-height: 1.6;
    }

    .hero-buttons {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
    }

    .primary-btn, .secondary-btn {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 22px;
      letter-spacing: 2px;
      padding: 14px 30px;
      border-radius: 12px;
      text-decoration: none;
      transition: 0.2s;
    }

    .primary-btn {
      background: var(--green);
      color: #000;
      box-shadow: 0 0 35px rgba(0,230,118,0.25);
    }

    .secondary-btn {
      background: rgba(255,255,255,0.08);
      color: #fff;
      border: 1px solid rgba(255,255,255,0.12);
    }

    .primary-btn:hover, .secondary-btn:hover { transform: translateY(-3px); }

    .hero-card {
      background: linear-gradient(145deg, rgba(0,230,118,0.14), rgba(255,47,143,0.14));
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 28px;
      padding: 28px;
      box-shadow: 0 30px 80px rgba(0,0,0,0.35);
    }

    .hero-card-inner {
      min-height: 380px;
      border-radius: 22px;
      background:
        linear-gradient(rgba(0,0,0,0.15), rgba(0,0,0,0.55)),
        url("argentina-home.jpg") center/cover;
      display: flex;
      align-items: end;
      padding: 24px;
      overflow: hidden;
    }

    .hero-card h2 {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 46px;
      letter-spacing: 2px;
    }

    .stats {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 14px;
      padding: 0 7% 40px;
    }

    .stat-box {
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 18px;
      padding: 22px;
      text-align: center;
    }

    .stat-box h3 {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 42px;
      color: var(--green);
    }

    .stat-box p {
      color: var(--muted);
      font-size: 14px;
      font-weight: 700;
      letter-spacing: 1px;
      text-transform: uppercase;
    }

    .flash {
      margin: 20px 7% 40px;
      background: linear-gradient(90deg, var(--pink), var(--red), var(--gold));
      color: #000;
      border-radius: 18px;
      padding: 18px 22px;
      text-align: center;
      font-family: 'Bebas Neue', sans-serif;
      font-size: 30px;
      letter-spacing: 2px;
      box-shadow: 0 20px 50px rgba(255,47,143,0.22);
    }

    .ticker-wrap {
      background: var(--green);
      overflow: hidden;
      white-space: nowrap;
      padding: 11px 0;
    }

    .ticker {
      display: inline-block;
      animation: ticker 22s linear infinite;
      font-family: 'Bebas Neue', sans-serif;
      font-size: 19px;
      color: #000;
      letter-spacing: 2px;
    }

    @keyframes ticker {
      from { transform: translateX(0); }
      to { transform: translateX(-50%); }
    }

    .section-title {
      text-align: center;
      padding: 60px 20px 18px;
    }

    .section-title .mini {
      color: var(--green);
      font-weight: 800;
      letter-spacing: 2px;
      text-transform: uppercase;
      font-size: 13px;
    }

    .section-title h2 {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(42px, 7vw, 72px);
      letter-spacing: 3px;
    }

    .section-title h2 span { color: var(--green); }

    .section-title p {
      color: var(--muted);
      margin-top: 8px;
    }

    .categories {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
      gap: 14px;
      max-width: 1100px;
      margin: 0 auto;
      padding: 20px 24px 35px;
    }

    .cat {
      background: linear-gradient(145deg, rgba(255,255,255,0.08), rgba(255,255,255,0.03));
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 18px;
      padding: 22px;
      text-align: center;
      transition: 0.2s;
    }

    .cat:hover {
      transform: translateY(-5px);
      border-color: var(--green);
    }

    .cat h3 {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 28px;
      letter-spacing: 1px;
    }

    .cat p {
      color: var(--muted);
      font-size: 13px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 26px;
      padding: 30px 24px 70px;
      max-width: 1350px;
      margin: 0 auto;
    }

    .card {
      background: linear-gradient(180deg, rgba(255,255,255,0.07), rgba(255,255,255,0.025));
      border-radius: 22px;
      overflow: hidden;
      border: 1px solid rgba(255,255,255,0.09);
      transition: 0.25s;
      position: relative;
      box-shadow: 0 22px 50px rgba(0,0,0,0.24);
    }

    .card:hover {
      transform: translateY(-8px);
      border-color: rgba(0,230,118,0.45);
      box-shadow: 0 25px 70px rgba(0,230,118,0.16);
    }

    .card-img {
      width: 100%;
      aspect-ratio: 1/1;
      object-fit: cover;
      background: #fff;
      display: block;
    }

    .card-body { padding: 18px; }

    .team-flag {
      font-size: 12px;
      letter-spacing: 2px;
      font-weight: 800;
      color: var(--green);
      text-transform: uppercase;
      margin-bottom: 6px;
    }

    .card-body h3 {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 30px;
      letter-spacing: 1px;
    }

    .type {
      color: var(--muted);
      font-size: 13px;
      margin-top: 3px;
    }

    .price-row {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-top: 14px;
      flex-wrap: wrap;
    }

    .old-price {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 21px;
      color: var(--muted);
      text-decoration: line-through;
    }

    .new-price {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 36px;
      color: var(--red);
    }

    .new-price span {
      font-size: 15px;
      color: var(--muted);
    }

    .discount-badge {
      background: var(--red);
      color: #fff;
      font-family: 'Bebas Neue', sans-serif;
      padding: 4px 9px;
      border-radius: 7px;
      letter-spacing: 1px;
      font-size: 13px;
    }

    .sizes {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
      margin-top: 12px;
    }

    .size-tag {
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 6px;
      padding: 4px 9px;
      font-size: 11px;
      font-weight: 800;
      color: var(--muted);
    }

    .btn-row {
      display: flex;
      gap: 8px;
      margin-top: 16px;
    }

    .dm-btn {
      flex: 1;
      text-align: center;
      color: #fff;
      font-family: 'Bebas Neue', sans-serif;
      font-size: 16px;
      letter-spacing: 1.5px;
      border-radius: 9px;
      padding: 12px 0;
      text-decoration: none;
      transition: 0.15s;
    }

    .dm-btn:hover { transform: scale(1.03); }

    .insta-btn { background: linear-gradient(135deg, #feda75, #d62976, #962fbf, #4f5bd5); }
    .messenger-btn { background: var(--messenger); }

    .ribbon {
      position: absolute;
      top: 14px;
      left: -8px;
      background: var(--red);
      color: #fff;
      font-family: 'Bebas Neue', sans-serif;
      font-size: 13px;
      letter-spacing: 1px;
      padding: 5px 14px 5px 12px;
      clip-path: polygon(0 0, 100% 0, 92% 50%, 100% 100%, 0 100%);
      z-index: 2;
    }

    .ribbon.gold { background: #b8860b; }

    .reviews {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      gap: 18px;
      max-width: 1100px;
      margin: 0 auto;
      padding: 20px 24px 70px;
    }

    .review {
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 20px;
      padding: 24px;
    }

    .stars { color: var(--gold); font-size: 20px; margin-bottom: 10px; }

    .review p { color: var(--muted); line-height: 1.5; }

    .review strong {
      display: block;
      margin-top: 15px;
      color: #fff;
    }

    .contact-strip {
      margin: 20px 7% 50px;
      background:
        radial-gradient(circle at top left, rgba(0,230,118,0.25), transparent 35%),
        linear-gradient(135deg, rgba(0,194,255,0.18), rgba(255,47,143,0.18));
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 28px;
      padding: 48px 24px;
      text-align: center;
    }

    .contact-strip h3 {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 52px;
      letter-spacing: 3px;
    }

    .contact-strip p {
      color: var(--muted);
      margin: 10px 0 24px;
    }

    .contact-btns {
      display: flex;
      gap: 14px;
      justify-content: center;
      flex-wrap: wrap;
    }

    .big-dm-btn, .big-msg-btn {
      color: #fff;
      font-family: 'Bebas Neue', sans-serif;
      font-size: 25px;
      letter-spacing: 2px;
      padding: 15px 38px;
      border-radius: 12px;
      text-decoration: none;
      transition: 0.15s;
    }

    .big-dm-btn { background: linear-gradient(135deg, #feda75, #d62976, #962fbf, #4f5bd5); }
    .big-msg-btn { background: var(--messenger); }

    .big-dm-btn:hover, .big-msg-btn:hover { transform: scale(1.04); }

    footer {
      text-align: center;
      padding: 32px 20px;
      color: var(--muted);
      font-size: 13px;
      border-top: 1px solid rgba(255,255,255,0.06);
    }

    footer strong { color: var(--green); }

    @media (max-width: 850px) {
      header {
        grid-template-columns: 1fr;
        padding: 55px 24px;
      }

      .hero-card-inner { min-height: 310px; }

      .stats { grid-template-columns: 1fr; padding: 0 24px 35px; }

      nav {
        align-items: flex-start;
        gap: 8px;
        flex-direction: column;
      }

      .nav-links { gap: 12px; }
    }
  </style>
</head>
